version: "3.9"

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: reliability-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - reliability-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── auth-service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: auth-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/auth_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./auth-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3001/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── payment-service ───────────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      SERVICE_NAME: payment-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/payment_db
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./payment-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3002/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── order-service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      SERVICE_NAME: order-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/order_db
      AUTH_SERVICE_URL: http://auth-service:3001
      PAYMENT_SERVICE_URL: http://payment-service:3002
      SERVICE_TIMEOUT_MS: 5000
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./order-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────────
  # Scrapes metrics from all 3 services every 15 seconds.
  # Stores time-series data in prometheus_data volume.
  # UI available at http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - reliability-net
    depends_on:
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

  # ── Grafana ───────────────────────────────────────────────────────────────────
  # Visualization layer on top of Prometheus.
  # Dashboards and datasources are provisioned automatically from files.
  # UI available at http://localhost:3000
  # Login: admin / admin (change on first login)
  #
  # WHY these environment variables:
  #
  # GF_SECURITY_ADMIN_PASSWORD
  #   Sets the initial admin password. Change this in production.
  #   Using a variable so you can override via .env file.
  #
  # GF_USERS_ALLOW_SIGN_UP=false
  #   Disables public self-registration. Only admin can create users.
  #
  # GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
  #   Sets the System Overview as the first thing you see on login.
  #   Without this, Grafana shows the default welcome screen.
  #
  # GF_ALERTING_ENABLED=false + GF_UNIFIED_ALERTING_ENABLED=true
  #   Disables legacy alerting, enables unified alerting (current standard).
  #   Unified alerting is what our alert-rules.yml uses.
  #
  # GF_FEATURE_TOGGLES_ENABLE=ngalert
  #   Enables next-generation alerting features needed for provisioned rules.
  #
  # GF_LOG_LEVEL=warn
  #   Reduces Grafana's own log noise in Docker logs.
  #   Use 'info' or 'debug' when troubleshooting Grafana itself.
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Admin credentials
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # Disable public signup
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Set default home dashboard
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/system-overview.json
      # Unified alerting (required for provisioned alert rules)
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # Reduce log noise
      GF_LOG_LEVEL: warn
      # Allow loading unsigned plugins if needed in future
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ""
      # Server settings
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_DOMAIN: localhost
      # Anonymous access disabled
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      # Provisioning directory — datasources, dashboards, alerts
      # :ro = read-only, Grafana cannot modify these config files
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Named volume for Grafana's own state — user preferences,
      # manually created dashboards (if any), plugin data
      # Without this, every restart resets Grafana completely
      - grafana_data:/var/lib/grafana
    networks:
      - reliability-net
    depends_on:
      - prometheus

# ── VOLUMES ────────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  prometheus_data:
    driver: local
  # Grafana's internal state: user sessions, plugin data, custom dashboards
  grafana_data:
    driver: local

# ── NETWORKS ──────────────────────────────────────────────────────────────────
# All containers communicate by service name on this network.
# Grafana → Prometheus: http://prometheus:9090
# Prometheus → services: http://auth-service:3001, etc.
networks:
  reliability-net:
    driver: bridge
