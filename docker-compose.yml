version: "3.9"

# ── SERVICES ──────────────────────────────────────────────────────────────────
services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: reliability-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - reliability-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── auth-service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: auth-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/auth_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./auth-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3001/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── payment-service ───────────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      SERVICE_NAME: payment-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/payment_db
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./payment-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3002/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── order-service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      SERVICE_NAME: order-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/order_db
      AUTH_SERVICE_URL: http://auth-service:3001
      PAYMENT_SERVICE_URL: http://payment-service:3002
      SERVICE_TIMEOUT_MS: 5000
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./order-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────────
  # Prometheus scrapes metrics from all 3 services every 15 seconds
  # and stores them as time-series data.
  #
  # WHY prometheus_data volume:
  # Without a named volume, all scraped metrics are lost when the
  # Prometheus container restarts. A named volume persists data across
  # restarts — this is what gives you historical metrics queryability.
  #
  # WHY mount prometheus.yml as read-only (:ro):
  # Prometheus only needs to READ its config. :ro prevents accidental
  # writes and makes clear this file is configuration, not state.
  #
  # WHY depends_on the services:
  # Prometheus can start before services are ready — it will show
  # targets as DOWN and retry. But starting after services are healthy
  # means the first scrape has data immediately.
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      # Default storage retention: 15 days
      # Increase for longer history at the cost of disk space
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      # Enable hot-reload via HTTP POST to /-/reload
      - '--web.enable-lifecycle'
      # Enable admin API for data deletion/snapshotting
      - '--web.enable-admin-api'
    volumes:
      # Mount our prometheus.yml config (read-only)
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Named volume for persistent time-series storage
      - prometheus_data:/prometheus
    networks:
      - reliability-net
    depends_on:
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

# ── VOLUMES ────────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  # Prometheus time-series data survives container restarts
  prometheus_data:
    driver: local

# ── NETWORKS ──────────────────────────────────────────────────────────────────
# All containers on this network can reach each other by service name.
# From Prometheus container: auth-service is at http://auth-service:3001
# From host machine: auth-service is at http://localhost:3001
networks:
  reliability-net:
    driver: bridge
