version: "3.9"

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: reliability-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - reliability-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # BullMQ uses Redis as its job storage backend.
  # All pending, active, completed, and failed jobs are stored here.
  #
  # WHY redis_data volume:
  # Without persistence, jobs in the queue are lost when Redis restarts.
  # With --appendonly yes, Redis writes every operation to disk.
  # On restart, Redis replays the log to restore state.
  # This means an order queued before a Redis restart will still be
  # processed after Redis comes back — no lost work.
  #
  # WHY maxmemory-policy allkeys-lru:
  # If Redis runs out of memory, it evicts least-recently-used keys.
  # This prevents Redis from crashing due to memory exhaustion.
  # For production, set maxmemory to a specific limit (e.g., 256mb).
  #
  # PORTS: 6379 exposed to host for debugging with Redis CLI or RedisInsight.
  redis:
    image: redis:7.2-alpine
    container_name: reliability-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - reliability-net
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── auth-service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: auth-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/auth_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./auth-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3001/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── payment-service ───────────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      SERVICE_NAME: payment-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/payment_db
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./payment-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3002/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── order-service ─────────────────────────────────────────────────────────────
  # order-service now depends on Redis for BullMQ queue operations.
  # REDIS_URL uses the container name for Docker internal networking.
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      SERVICE_NAME: order-service
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/order_db
      AUTH_SERVICE_URL: http://auth-service:3001
      PAYMENT_SERVICE_URL: http://payment-service:3002
      SERVICE_TIMEOUT_MS: 5000
      # Redis connection for BullMQ
      REDIS_URL: redis://redis:6379
      # Worker concurrency — how many jobs to process simultaneously
      WORKER_CONCURRENCY: 5
      LOG_LEVEL: info
      HIGH_LATENCY: ${HIGH_LATENCY:-false}
      LATENCY_MS: ${LATENCY_MS:-0}
      FAILURE_RATE: ${FAILURE_RATE:-0}
      TIMEOUT_MODE: ${TIMEOUT_MODE:-false}
    volumes:
      - ./order-service/logs:/app/logs
    networks:
      - reliability-net
    depends_on:
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - reliability-net
    depends_on:
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/system-overview.json
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_LOG_LEVEL: warn
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - reliability-net
    depends_on:
      - prometheus

# ── VOLUMES ────────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  # Redis AOF persistence — jobs survive Redis restarts
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── NETWORKS ──────────────────────────────────────────────────────────────────
networks:
  reliability-net:
    driver: bridge
