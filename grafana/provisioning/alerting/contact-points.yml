# grafana/provisioning/alerting/contact-points.yml
#
# Defines WHERE alerts are sent when they fire.
# Currently configured with a no-op default receiver.
#
# TO ADD SLACK:
# Replace the GrafanaDefaultEmailReceiver settings with:
#   - name: slack-alerts
#     type: slack
#     settings:
#       url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
#       title: "{{ .CommonAnnotations.summary }}"
#       text: "{{ .CommonAnnotations.description }}"
#
# TO ADD PAGERDUTY:
#   - name: pagerduty-oncall
#     type: pagerduty
#     settings:
#       integrationKey: YOUR_PAGERDUTY_INTEGRATION_KEY

apiVersion: 1

contactPoints:
  - orgId: 1
    name: default-receiver
    receivers:
      - uid: default-receiver-uid
        type: email
        settings:
          addresses: admin@localhost
          singleEmail: false
        disableResolveMessage: false
