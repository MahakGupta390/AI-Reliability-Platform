# prometheus/prometheus.yml
#
# Prometheus scrape configuration for AI Reliability Platform.
#
# HOW SCRAPING WORKS:
# Prometheus is pull-based. Every scrape_interval seconds, Prometheus
# sends a GET request to each target's metrics_path and stores the
# returned metrics with the current timestamp.
#
# INSIDE DOCKER: Services are reachable by container name.
# auth-service:3001, payment-service:3002, order-service:3003
# These DNS names are resolved by Docker's internal DNS server.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    platform: ai-reliability-platform

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: auth-service
    metrics_path: /metrics/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['auth-service:3001']
        labels:
          service: auth-service
          team: platform

  - job_name: payment-service
    metrics_path: /metrics/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['payment-service:3002']
        labels:
          service: payment-service
          team: payments

  - job_name: order-service
    metrics_path: /metrics/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['order-service:3003']
        labels:
          service: order-service
          team: orders
